            comments: [

          {

            name: 'Defensa Holandesa',
            movesDisplay: ["1. d4 f5", "2. g3 Nf6", "3. Bg2 e6", "4. c4 Be7", "5. Nf3 O-O"],
            movesEngine: ["d4", "f5", "g3", "Nf6", "Bg2", "e6", "c4", "Be7", "Nf3", "O-O"],
            comments: [
              "Las blancas toman el centro de manera tradicional.",
              "¡La Holandesa! Rompe la simetría y controla la casilla e4 fuertemente.",
              "Prepara el fianchetto del alfil para contrarrestar el control negro.",
              "Desarrolla el caballo de rey hacia el centro.",
              "El alfil se sitúa en la gran diagonal, apuntando al flanco de dama.",
              "Sólida jugada preparatoria, abriendo paso al desarrollo del alfil.",
              "Las blancas reclaman más espacio en el centro y flanco de dama.",
              "Desarrollo tranquilo del alfil de rey, apuntando a enrocar rápido.",

              "Las negras enrocan rápidamente, asegurando al rey en su agresiva defensa."

        ];

        function App() {
          const audioCtxRef = useRef(null);
          const analysisEndRef = useRef(null); 
          
          const [casillaActiva, setCasillaActiva] = useState(null);
          const [notaActual, setNotaActual] = useState('Esperando jugada...'); 
          
          const [showAbiertas, setShowAbiertas] = useState(false);
          const [showSemiabiertas, setShowSemiabiertas] = useState(false);
          const [showCerradas, setShowCerradas] = useState(false);
          const [showSemicerradas, setShowSemicerradas] = useState(false);

          const [aperturaSeleccionada, setAperturaSeleccionada] = useState(OPENINGS_DB[0]);
          const [isPlaying, setIsPlaying] = useState(false);
          const [isMuted, setIsMuted] = useState(false);
          const [isFlipped, setIsFlipped] = useState(false);
          const [showTitle, setShowTitle] = useState(true);
          const [themeIndex, setThemeIndex] = useState(0);
          
          const [game, setGame] = useState(null);
          const [selectedSquare, setSelectedSquare] = useState(null);
          const [boardUpdate, setBoardUpdate] = useState(0);

          useEffect(() => {
            import('https://esm.sh/chess.js@1.0.0-beta.8').then(({ Chess }) => {
              setGame(new Chess());
            }).catch(err => console.error("Error cargando chess.js", err));

            const timer = setTimeout(() => setShowTitle(false), 3000);
            return () => clearTimeout(timer);
          }, []);

          useEffect(() => {
            if (analysisEndRef.current) {
              analysisEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }
          }, [boardUpdate]);

          const initAudio = () => {
            if (!audioCtxRef.current) {
              audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtxRef.current.state === 'suspended') {
              audioCtxRef.current.resume();
            }
            return audioCtxRef.current;
          };

          const playTone = (ctx, freq, startTime, duration) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, startTime);
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.3, startTime + 0.05);
            gain.gain.setValueAtTime(0.3, startTime + duration - 0.1);
            gain.gain.linearRampToValueAtTime(0, startTime + duration);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(startTime);
            osc.stop(startTime + duration);
          };

          const reproducirApertura = async () => {
            if (!game || isPlaying) return;
            setIsPlaying(true);
            game.reset();
            setBoardUpdate(prev => prev + 1);
            setSelectedSquare(null);

            const ctx = initAudio();
            const duracion = 0.4;

            for (let moveStr of aperturaSeleccionada.movesEngine) {
              const move = game.move(moveStr);
              if (move) {
                setBoardUpdate(prev => prev + 1);
                const file = move.to[0];
                const rank = move.to[1];
                setCasillaActiva(move.to);
                setNotaActual(`${aperturaSeleccionada.name}`);
                const tiempoActual = ctx.currentTime;
                if (!isMuted) {
                  playTone(ctx, FRECUENCIAS[file], tiempoActual, duracion);
                  playTone(ctx, FRECUENCIAS[rank], tiempoActual + duracion, duracion);
                }
                await new Promise(resolve => setTimeout(resolve, 1500));
              }
            }
            setCasillaActiva(null);
            setIsPlaying(false);
          };

          const resetBoard = () => {
            if (game) {
              game.reset();
              setBoardUpdate(prev => prev + 1);
              setSelectedSquare(null);
              setCasillaActiva(null);
              setIsPlaying(false);
              setNotaActual('Tablero reiniciado');
            }
          };

          const undoMove = () => {
            if (game && !isPlaying) {
              const move = game.undo();
              if (move) {
                setBoardUpdate(prev => prev + 1);
                setSelectedSquare(null);
                setCasillaActiva(null);
                setNotaActual('Deshacer');
              }
            }
          };

          const toggleOrientation = () => setIsFlipped(!isFlipped);

          const stepForward = () => {
            if (!game || isPlaying) return;
            const nextMoveIndex = game.history().length;
            if (nextMoveIndex < aperturaSeleccionada.movesEngine.length) {
              try {
                const move = game.move(aperturaSeleccionada.movesEngine[nextMoveIndex]);
                if (move) {
                  setBoardUpdate(prev => prev + 1);
                  const file = move.to[0];
                  const rank = move.to[1];
                  setCasillaActiva(move.to);
                  setNotaActual(`${aperturaSeleccionada.name}`);
                  const ctx = initAudio();
                  const tiempoActual = ctx.currentTime;
                  const duracion = 0.4;
                  if (!isMuted) {
                    playTone(ctx, FRECUENCIAS[file], tiempoActual, duracion);
                    playTone(ctx, FRECUENCIAS[rank], tiempoActual + duracion, duracion);
                  }
                  setTimeout(() => setCasillaActiva(null), duracion * 2 * 1000);
                }
              } catch (e) {
                setNotaActual('Variante detectada');
              }
            }
          };

          const handleSquareClick = (file, rank) => {
            if (isPlaying) return;
            const ctx = initAudio();
            const tiempoActual = ctx.currentTime;
            const duracion = 0.4;
            const squareId = `${file}${rank}`;

            if (game) {
              if (selectedSquare) {
                try {
                  const move = game.move({ from: selectedSquare, to: squareId, promotion: 'q' });
                  if (move) {
                    setBoardUpdate(prev => prev + 1);
                    setSelectedSquare(null);
                  } else {
                    const piece = game.get(squareId);
                    if (piece && piece.color === game.turn()) setSelectedSquare(squareId);
                    else setSelectedSquare(null);
                  }
                } catch (e) {
                  const piece = game.get(squareId);
                  if (piece && piece.color === game.turn()) setSelectedSquare(squareId);
                  else setSelectedSquare(null);
                }
              } else {
                const piece = game.get(squareId);
                if (piece && piece.color === game.turn()) setSelectedSquare(squareId);
              }
            }

            const freq1 = FRECUENCIAS[file];
            const freq2 = FRECUENCIAS[rank];
            setCasillaActiva(squareId);
            setNotaActual(isMuted ? squareId.toUpperCase() : `${squareId.toUpperCase()} | ${NOMBRES_NOTAS[file]}-${NOMBRES_NOTAS[rank]}`);
            if (!isMuted) {
              playTone(ctx, freq1, tiempoActual, duracion);
              playTone(ctx, freq2, tiempoActual + duracion, duracion);
            }
            setTimeout(() => setCasillaActiva(null), duracion * 2 * 1000);
          };

          const selectOpening = (op) => {
            setAperturaSeleccionada(op);
            setShowAbiertas(false);
            setShowSemiabiertas(false);
            setShowCerradas(false);
            setShowSemicerradas(false);
            if (game) {
              game.reset();
              setBoardUpdate(prev => prev + 1);
              setNotaActual(`${op.name}`);
            }
          };

          const toggleMenu = (menuSetter, currentVal) => {
            setShowAbiertas(false);
            setShowSemiabiertas(false);
            setShowCerradas(false);
            setShowSemicerradas(false);
            menuSetter(!currentVal);
          };

          return (
            <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4 sm:p-8 font-sans text-slate-200">
              <div className="w-full max-w-6xl">
                
                {showTitle && (
                  <div className="text-center mb-6 transition-opacity duration-1000 ease-in-out">
                    <h1 className="text-3xl sm:text-4xl font-extrabold text-white flex items-center justify-center gap-3">
                      <Volume2 className="text-emerald-400 w-8 h-8 sm:w-10 h-10" /> Ajedrez Musical
                    </h1>
                  </div>
                )}

                <div className="mb-6 flex flex-col items-center w-full relative z-30 gap-6">
                  
                  {/* Clasificación Técnica */}
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-2 w-full">
                    <div className="relative">
                      <button onClick={() => toggleMenu(setShowAbiertas, showAbiertas)} className={`flex items-center justify-center gap-2 w-full h-10 rounded-xl text-xs font-black transition-all border-2 ${showAbiertas ? 'bg-blue-600 border-blue-400 text-white' : 'bg-slate-700 border-slate-600'}`}>
                        <BookOpen size={16} className={showAbiertas ? 'text-white' : 'text-blue-400'} /> ABIERTAS
                      </button>
                      {showAbiertas && (
                        <div className="absolute top-12 left-0 bg-slate-900 border-2 border-blue-500 rounded-xl p-2 w-64 shadow-2xl z-50 flex flex-col gap-1">
                          <p className="text-sm text-blue-400 uppercase font-bold px-2 py-1 border-b border-slate-800">1.e4 e5</p>
                          {OPENINGS_DB.filter(o => o.category === 'abierta').map(op => (
                            <button key={op.id} onClick={() => selectOpening(op)} className="text-left px-4 py-3 text-sm rounded-lg hover:bg-blue-900/40">{op.name}</button>
                          ))}
                        </div>
                      )}
                    </div>

                    <div className="relative">
                      <button onClick={() => toggleMenu(setShowSemiabiertas, showSemiabiertas)} className={`flex items-center justify-center gap-2 w-full h-10 rounded-xl text-xs font-black transition-all border-2 ${showSemiabiertas ? 'bg-indigo-600 border-indigo-400 text-white' : 'bg-slate-700 border-slate-600'}`}>
                        <BookOpen size={16} className={showSemiabiertas ? 'text-white' : 'text-indigo-400'} /> SEMIABIERTAS
                      </button>
                      {showSemiabiertas && (
                        <div className="absolute top-12 left-0 bg-slate-900 border-2 border-indigo-500 rounded-xl p-2 w-64 shadow-2xl z-50 flex flex-col gap-1">
                          <p className="text-sm text-indigo-400 uppercase font-bold px-2 py-1 border-b border-slate-800">Asimétricas</p>
                          {OPENINGS_DB.filter(o => o.category === 'semiabierta').map(op => (
                            <button key={op.id} onClick={() => selectOpening(op)} className="text-left px-4 py-3 text-sm rounded-lg hover:bg-indigo-900/40">{op.name}</button>
                          ))}
                        </div>
                      )}
                    </div>

                    <div className="relative">
                      <button onClick={() => toggleMenu(setShowCerradas, showCerradas)} className={`flex items-center justify-center gap-2 w-full h-10 rounded-xl text-xs font-black transition-all border-2 ${showCerradas ? 'bg-amber-600 border-amber-400 text-white' : 'bg-slate-700 border-slate-600'}`}>
                        <BookOpen size={16} className={showCerradas ? 'text-white' : 'text-amber-400'} /> CERRADAS
                      </button>
                      {showCerradas && (
                        <div className="absolute top-12 left-0 md:left-auto md:right-0 bg-slate-900 border-2 border-amber-500 rounded-xl p-2 w-64 shadow-2xl z-50 flex flex-col gap-1">
                          <p className="text-sm text-amber-400 uppercase font-bold px-2 py-1 border-b border-slate-800">1.d4 d5</p>
                          {OPENINGS_DB.filter(o => o.category === 'cerrada').map(op => (
                            <button key={op.id} onClick={() => selectOpening(op)} className="text-left px-4 py-3 text-sm rounded-lg hover:bg-amber-900/40">{op.name}</button>
                          ))}
                        </div>
                      )}
                    </div>

                    <div className="relative">
                      <button onClick={() => toggleMenu(setShowSemicerradas, showSemicerradas)} className={`flex items-center justify-center gap-2 w-full h-10 rounded-xl text-xs font-black transition-all border-2 ${showSemicerradas ? 'bg-green-600 border-green-400 text-white' : 'bg-slate-700 border-slate-600'}`}>
                        <BookOpen size={16} className={showSemicerradas ? 'text-white' : 'text-green-400'} /> SEMICERRADAS
                      </button>
                      {showSemicerradas && (
                        <div className="absolute top-12 right-0 bg-slate-900 border-2 border-green-500 rounded-xl p-2 w-64 shadow-2xl z-50 flex flex-col gap-1">
                          <p className="text-sm text-green-400 uppercase font-bold px-2 py-1 border-b border-slate-800">Indias/Otros</p>
                          {OPENINGS_DB.filter(o => o.category === 'semicerrada').map(op => (
                            <button key={op.id} onClick={() => selectOpening(op)} className="text-left px-4 py-3 text-sm rounded-lg hover:bg-green-900/40">{op.name}</button>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>

                  {/* Controles Principales */}
                  <div className="flex items-center justify-center gap-2 w-full max-w-[550px]">
                    {/* Silencio */}
                    <button onClick={() => setIsMuted(!isMuted)} disabled={isPlaying} className={`flex-shrink-0 w-10 h-10 flex items-center justify-center border-2 rounded-xl shadow-md transition-colors ${isMuted ? 'bg-rose-600 hover:bg-rose-500 border-rose-500 text-white' : 'bg-slate-700 hover:bg-slate-600 border-slate-600 text-white'} disabled:opacity-50`} title={isMuted ? "Activar Sonido" : "Silenciar"}>
                      {isMuted ? <VolumeX size={18} /> : <Volume2 size={18} />}
                    </button>

                    {/* Reiniciar */}
                    <button onClick={resetBoard} disabled={isPlaying} className="flex-shrink-0 w-10 h-10 flex items-center justify-center bg-slate-700 hover:bg-slate-600 border-2 border-slate-600 rounded-xl text-white disabled:text-slate-500 shadow-md">
                      <RefreshCw size={18} />
                    </button>

                    {/* Grupo Playback */}
                    <div className="flex items-center flex-1 h-10 rounded-xl overflow-hidden border-2 border-slate-600 shadow-lg bg-slate-700 max-w-[320px]">
                      <button onClick={undoMove} disabled={isPlaying} className="flex-1 h-full flex items-center justify-center hover:bg-slate-600 border-r border-slate-600 text-white disabled:text-slate-500">
                        <Undo2 size={18} />
                      </button>
                      <button onClick={reproducirApertura} disabled={isPlaying} className="flex-[2.5] h-full flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-xs uppercase tracking-tighter disabled:bg-slate-600 disabled:text-slate-400">
                        <Play size={18} className={isPlaying ? "text-slate-400 animate-pulse" : "text-yellow-400"} /> 
                        {isPlaying ? 'Tocando' : 'Reproducir'}
                      </button>
                      <button onClick={stepForward} disabled={isPlaying} className="flex-1 h-full flex items-center justify-center hover:bg-slate-600 border-l border-slate-600 text-white disabled:text-slate-500">
                        <StepForward size={18} />
                      </button>
                    </div>

                    {/* Girar Tablero */}
                    <button onClick={toggleOrientation} className="flex-shrink-0 w-10 h-10 flex items-center justify-center bg-slate-700 hover:bg-slate-600 border-2 border-slate-600 rounded-xl text-white shadow-md">
                      <ArrowUpDown size={18} className="text-emerald-400" />
                    </button>

                    {/* Cambiar Color Tablero */}
                    <button onClick={() => setThemeIndex((prev) => (prev + 1) % BOARD_THEMES.length)} className="flex-shrink-0 w-10 h-10 flex items-center justify-center bg-slate-700 hover:bg-slate-600 border-2 border-slate-600 rounded-xl text-white shadow-md" title="Cambiar color del tablero">
                      <Palette size={18} className="text-sky-400" />
                    </button>
                  </div>
                </div>

                {/* Tablero y Análisis */}
                <div className="flex flex-col items-center justify-center w-full gap-4">
                  <div className="flex flex-col md:flex-row items-stretch justify-center gap-4 w-full">
                    {/* Tablero */}
                    <div className="relative border-[4px] border-slate-700 rounded-lg shadow-2xl flex flex-col w-full max-w-[650px] flex-1 aspect-square mx-auto md:mx-0">
                      {!game && <div className="absolute inset-0 z-10 flex items-center justify-center bg-slate-900/80 text-white font-bold rounded-lg">Cargando...</div>}
                      {(isFlipped ? [...RANKS].reverse() : RANKS).map((rank, rankIndex) => (
                        <div key={rank} className="flex flex-1 w-full aspect-[8/1]">
                          {(isFlipped ? [...FILES].reverse() : FILES).map((file, fileIndex) => {
                            const squareId = `${file}${rank}`;
                            const esCasillaClara = (rankIndex + fileIndex) % 2 === 0;
                            const isActiva = casillaActiva === squareId || selectedSquare === squareId;
                            
                            const theme = BOARD_THEMES[themeIndex];
                            let currentBg = esCasillaClara ? theme.light : theme.dark;
                            if (selectedSquare === squareId) currentBg = '#fde047'; // Amarillo selección fuerte
                            else if (isActiva) currentBg = '#fef9c3'; // Amarillo selección suave
                            
                            const textColor = esCasillaClara ? theme.dark : theme.light;

                            const piece = game ? game.get(squareId) : null;
                            const pieceImg = piece ? PIECES_WIKIPEDIA[piece.color][piece.type] : null;
                            return (
                              <button key={squareId} onClick={() => handleSquareClick(file, rank)} style={{ backgroundColor: currentBg }} className={`relative flex-1 aspect-square select-none transition-all duration-200 flex items-center justify-center ${isActiva ? 'ring-inset ring-2 ring-yellow-400 z-10 scale-[1.02] shadow-sm' : ''} ${selectedSquare === squareId ? 'ring-inset ring-2 ring-yellow-500' : ''}`}>
                                {pieceImg && <img src={pieceImg} alt="" className="w-[85%] h-[85%] object-contain drop-shadow-md pointer-events-none" />}
                                {fileIndex === 0 && <span style={{ color: textColor }} className="absolute top-0.5 left-1 text-[10px] md:text-xs font-bold">{rank}</span>}
                                {rankIndex === 7 && <span style={{ color: textColor }} className="absolute bottom-0.5 right-1 text-[10px] md:text-xs font-bold">{file}</span>}
                              </button>
                            );
                          })}
                        </div>
                      ))}
                    </div>

                    {/* Panel Lateral (Integrado) */}
                    <div className="w-full md:w-64 relative min-h-[300px] flex-shrink-0">
                      <div className="absolute inset-0 bg-slate-900 border-2 border-slate-700 rounded-xl shadow-2xl flex flex-col items-center justify-start overflow-hidden">
                         
                         {/* Nueva ubicación del Nombre de la Apertura / Estado */}
                         <div className="w-full bg-emerald-900/30 border-b border-emerald-500/20 py-2 px-2 text-center">
                           <p className="text-xs font-mono text-emerald-400 uppercase tracking-widest font-bold leading-tight min-h-[1.5rem] flex items-center justify-center">
                             {notaActual}
                           </p>
                         </div>

                         <h4 className="text-xs text-slate-500 uppercase font-black mt-2 mb-1 border-b border-slate-800 w-full text-center pb-1">Secuencia</h4>
                         <div className="w-full text-sm font-mono space-y-1 mb-2 bg-slate-800/50 p-1.5">
                           {Array.from({ length: 5 }).map((_, i) => {
                             const wIndex = i * 2; const bIndex = i * 2 + 1;
                             const history = game ? game.history() : [];
                             const expectedW = aperturaSeleccionada.movesEngine[wIndex];
                             const expectedB = aperturaSeleccionada.movesEngine[bIndex];
                             const isWCorrect = history.length > wIndex && history.slice(0, wIndex + 1).every((m, idx) => m === aperturaSeleccionada.movesEngine[idx]);
                             const isBCorrect = history.length > bIndex && history.slice(0, bIndex + 1).every((m, idx) => m === aperturaSeleccionada.movesEngine[idx]);
                             return (
                               <div key={i} className="flex justify-between w-full border-b border-slate-700/30 pb-0.5 last:border-0 px-1">
                                 <span className="text-slate-600 font-bold">{i + 1}.</span>
                                 <span className={`w-8 text-center ${isWCorrect ? 'text-emerald-400 font-bold' : 'text-slate-500'}`}>{expectedW || '-'}</span>
                                 <span className={`w-8 text-center ${isBCorrect ? 'text-emerald-400 font-bold' : 'text-slate-500'}`}>{expectedB || '-'}</span>
                               </div>
                             );
                           })}
                         </div>
                         
                         <div className="w-full mt-1 pt-1 border-t border-slate-800 flex flex-col items-center overflow-y-auto flex-1 scroll-smooth no-scrollbar">
                           <h4 className="text-xs text-emerald-500 uppercase font-black mb-2 text-center">Análisis</h4>
                           <div className="w-full space-y-2 pb-2 px-2">
                             {(game ? game.history() : []).map((move, idx) => {
                               const isCorrect = move === aperturaSeleccionada.movesEngine[idx];
                               const comment = isCorrect ? (aperturaSeleccionada.comments[idx] || "Estándar.") : "Variante.";
                               const prefix = (idx % 2 === 0) ? `${Math.floor(idx / 2) + 1}.` : `${Math.floor(idx / 2) + 1}...`;
                               return (
                                 <div key={idx} className={`flex flex-col bg-slate-800 p-3 rounded-lg border-l-2 shadow-sm ${isCorrect ? 'border-emerald-500' : 'border-rose-500'}`}>
                                   <span className={`text-sm font-mono font-black ${isCorrect ? 'text-emerald-400' : 'text-rose-400'}`}>{prefix} {move}</span>
                                   <span className="text-xs text-slate-300 leading-snug italic mt-1">{comment}</span>
                                 </div>
                               );
                             })}
                             <div ref={analysisEndRef} />
                           </div>
                         </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
